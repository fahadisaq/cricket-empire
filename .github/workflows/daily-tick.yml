name: Daily World Tick
# Advances the Cricket Empire world by one game-week each day by hitting the
# deployed tick endpoint. Reliable + free on GitHub Actions (public repo).
# Also acts as a Supabase keep-alive (the tick reads/writes the DB).

on:
  schedule:
    - cron: "0 9 * * *" # every day at 09:00 UTC
  workflow_dispatch: # manual "play next week" button in the Actions tab

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Advance the world one week
        run: |
          set -uo pipefail
          response=$(curl -fsS -w $'\n%{http_code}' -X POST "${{ secrets.TICK_URL }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"weeks":1}')
          curl_exit=$?
          code=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')
          echo "HTTP $code"
          printf '%s' "${body:0:400}"
          echo
          if [ "$curl_exit" -ne 0 ] || [ "$code" != "200" ]; then
            echo "::error::Tick failed (curl_exit=$curl_exit, http=$code)"
            exit 1
          fi
          echo "✓ Tick succeeded"
